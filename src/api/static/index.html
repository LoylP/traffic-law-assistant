<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Traffic Law Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #161a1f;
      --border: #2a2f36;
      --text: #e6e9ef;
      --text-muted: #8b919e;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --score-high: #22c55e;
      --score-mid: #eab308;
      --fine: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .search-wrap {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .search-wrap input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap button {
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-wrap button:hover { background: var(--accent-hover); }
    .search-wrap button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      padding: 1rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px;
      color: #fca5a5;
      margin-bottom: 1.5rem;
    }
    .results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .result-card:hover { border-color: #3a4050; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .result-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 500;
    }
    .result-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--score-high);
      font-weight: 500;
    }
    .result-desc {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .result-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .result-meta span { margin-right: 1rem; }
    .result-legal {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--fine);
    }
    .empty, .hint {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    .hint { padding: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Traffic Law Search</h1>
    <p class="subtitle">Tìm kiếm vi phạm giao thông theo mô tả tự nhiên</p>
    <div class="search-wrap">
      <input
        type="text"
        id="query"
        placeholder="VD: vượt đèn đỏ, không đội mũ bảo hiểm, dừng xe đột ngột..."
        autofocus
        enterkeyhint="search"
      />
      <button type="button" id="btn">Tìm kiếm</button>
    </div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="results" class="results"></div>
    <p id="hint" class="hint">Nhập cụm từ và bấm Tìm kiếm để xem kết quả.</p>
  </div>
  <script>
    const queryEl = document.getElementById('query');
    const btnEl = document.getElementById('btn');
    const errorEl = document.getElementById('error');
    const resultsEl = document.getElementById('results');
    const hintEl = document.getElementById('hint');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      resultsEl.innerHTML = '';
      hintEl.style.display = 'none';
    }
    function hideError() {
      errorEl.style.display = 'none';
    }
    function setLoading(loading) {
      btnEl.disabled = loading;
      btnEl.textContent = loading ? 'Đang tìm...' : 'Tìm kiếm';
    }
    function renderResults(data) {
      hintEl.style.display = 'none';
      const list = data.results || [];
      if (list.length === 0) {
        resultsEl.innerHTML = '<p class="empty">Không có kết quả.</p>';
        return;
      }
      resultsEl.innerHTML = list.map((r, i) => {
        const score = (r.score != null ? Number(r.score).toFixed(4) : '–');
        const desc = (r.description_natural || r.normalized_violation || '').trim();
        const vehicle = r.vehicle_type || '–';
        const fine = (r.fine_min != null && r.fine_max != null)
          ? `${Number(r.fine_min).toLocaleString('vi-VN')} – ${Number(r.fine_max).toLocaleString('vi-VN')} ₫`
          : '–';
        const legal = (r.legal_basis || '').trim();
        return `
          <article class="result-card">
            <div class="result-header">
              <span class="result-id">${escapeHtml(r.violation_id || r._id || `#${i + 1}`)}</span>
              <span class="result-score">score ${score}</span>
            </div>
            <div class="result-desc">${escapeHtml(desc)}</div>
            <div class="result-meta">
              <span>Loại xe: ${escapeHtml(vehicle)}</span>
              <span>Phạt: ${escapeHtml(fine)}</span>
            </div>
            ${legal ? `<div class="result-legal">${escapeHtml(legal)}</div>` : ''}
          </article>
        `;
      }).join('');
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    async function doSearch() {
      const q = (queryEl.value || '').trim();
      if (!q) return;
      hideError();
      setLoading(true);
      try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || 'Lỗi tìm kiếm');
        renderResults(data);
      } catch (e) {
        showError(e.message || 'Lỗi kết nối. Kiểm tra OpenSearch và đã chạy ingest chưa.');
      } finally {
        setLoading(false);
      }
    }
    btnEl.addEventListener('click', doSearch);
    queryEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
  </script>
</body>
</html>
